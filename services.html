<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서비스 | EM시스템</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0e14;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --faint:rgba(255,255,255,.45);
      --gold:#c8a97e;
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --r:18px;
      --max:1160px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"IBM Plex Sans KR",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 20% 10%, rgba(200,169,126,.18), transparent 55%),
        radial-gradient(900px 520px at 80% 15%, rgba(90,160,255,.14), transparent 58%),
        linear-gradient(180deg,#070a10 0%,var(--bg) 70%);
      overflow-x:hidden;
    }
    a{color:inherit}
    .wrap{max-width:var(--max);margin:0 auto;padding:0 20px}

    /* ✅ 공통 상단바 */
    .topbar{
      position:sticky; top:0; z-index:1000;
      backdrop-filter: blur(10px);
      background: rgba(9,11,17,.65);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .topbar .wrap{
      height: 84px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .brand{display:flex;align-items:center;text-decoration:none}
    .brand img{
      height: 52px; /* ✅ 로고 더 크게 */
      width:auto;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }
    .nav{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);flex-wrap:wrap}
    .nav a{text-decoration:none;padding:10px 12px;border-radius:999px;transition:.2s ease}
    .nav a:hover{color:var(--text);background:rgba(255,255,255,.06)}
    .nav a.active{color:var(--text);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .nav .cta{color:#111;background:var(--gold);font-weight:900}

    /* 페이지 */
    .page{padding:34px 0 46px}
    h1{font-family:"Playfair Display",serif;font-weight:600;margin:0 0 10px;font-size:38px}
    .sub{margin:0;color:var(--muted);line-height:1.7}

    /* 카드 */
    .cards{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .card{
      border-radius:var(--r);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      overflow:hidden;
      transition:.25s ease;
      min-height:360px;
    }
    .card:hover{transform:translateY(-2px);background:rgba(255,255,255,.07)}
    .media{height:190px;overflow:hidden}
    .media img{width:100%;height:100%;object-fit:cover;filter:brightness(1.04) contrast(1.05) saturate(1.06)}
    .body{padding:16px}
    .body h2{margin:0 0 8px;font-size:18px}
    .body p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}

    /* ✅ 카카오 고정 버튼(모든 페이지 공통) */
    .kakao-fixed{
      position: fixed; right:18px; bottom:18px; z-index:1200;
      display:inline-flex; align-items:center; gap:10px;
      padding:14px 16px;border-radius:999px;
      background: rgba(254,229,0,.95); color:#111; font-weight:900; text-decoration:none;
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 18px 55px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      transition:.2s ease;
    }
    .kakao-fixed:hover{transform:translateY(-2px);filter:brightness(.98);box-shadow:0 22px 70px rgba(0,0,0,.55)}
    .kakao-dot{width:10px;height:10px;border-radius:999px;background:#111;opacity:.85;box-shadow:0 0 0 5px rgba(17,17,17,.08)}

    @media(max-width:980px){
      .cards{grid-template-columns:1fr}
      .topbar .wrap{height:auto;padding:10px 0}
      .brand img{height:46px}
    }
    @media(max-width:520px){
      .kakao-fixed span:last-child{display:none;}
      .kakao-fixed{width:56px;height:56px;justify-content:center;padding:0;}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html" aria-label="EM시스템 홈">
        <img src="images/ems-logo.png" alt="EM시스템 로고">
      </a>

      <nav class="nav" aria-label="메뉴">
        <a href="index.html">홈</a>
        <a href="services.html" class="active">서비스</a>
        <a href="works.html">시공사례</a>
        <a href="about.html">강점</a>
        <a href="contact.html">문의</a>
        <a href="contact.html" class="cta">견적요청</a>
      </nav>
    </div>
  </div>

  <main class="page">
    <div class="wrap">
      <h1>서비스</h1>
      <p class="sub">행사 규모와 현장 환경에 맞춰 필요한 품목만 선택하여 진행할 수 있습니다.</p>

      <div class="cards">
        <section class="card">
          <div class="media"><img src="images/fabric-booth.jpg" alt="페브릭 부스"></div>
          <div class="body">
            <h2>페브릭 부스</h2>
            <p>렌탈만 / 설치·철거 포함 선택 가능. 행사 규모에 맞춰 모듈 구성으로 빠르게 세팅합니다.</p>
          </div>
        </section>

        <section class="card">
          <div class="media"><img src="images/infor.png" alt="간판 사인물"></div>
          <div class="body">
            <h2>간판 · 사인물</h2>
            <p>부스 상부 간판 및 행사 안내 사인을 현장 규격에 맞춰 제작·설치합니다.</p>
          </div>
        </section>

        <section class="card">
          <div class="media"><img src="images/information.png" alt="인포데스크"></div>
          <div class="body">
            <h2>인포데스크</h2>
            <p>규격 데스크 렌탈 및 그래픽 적용. 동선에 맞춘 배치까지 지원합니다.</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <a class="kakao-fixed" href="http://pf.kakao.com/_SxlTzX" target="_blank" rel="noopener">
    <span class="kakao-dot"></span><span>카카오 상담</span>
  </a>
</body>
</html>
